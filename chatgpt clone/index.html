<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chatgpt - clone</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
        <div class="top">
            <span class="icon options">
                <span class="option-dot"></span>
                <span class="option-dot"></span>
                <span class="option-dot"></span>
            </span>
            <span class="icon new-chat">
                <svg>
                    <!-- draw cadre  -->
                    <path d="M 25 7 7 7 7  33 33 33 33 15" stroke="rgb(76, 75, 75)" fill="none"></path>
                    <!-- draw pen -->
                    <path d="M 25 5  12 21  12 28 18 28  36 14  25 5 " stroke="rgb(76, 75, 75)" fill="rgb(76, 75, 75)"></path>
                </svg>
            </span>
            <span class="icon get-plus">
                <span>Get plus +</span>
            </span>
            <span class="icon menu">
                <span class="menu-bar"></span>
                <span class="menu-bar"></span>
            </span>
        </div>

        <div class="main">
            <!-- help message : hide only if send button clicked and the input text !empty -->
            <div class="ask-help">
                <span>
                    How can i help you ?
                </span>
            </div>

            <!-- load effects  -->
            <!-- <div class="loader">
                <span class="loader">
                    <span></span>
                    <span></span>
                    <span></span>
                </span>
            </div> -->

            <!-- messages are added with js  -->
            
        </div>


        <div class="bottom">
            <span class="input">
                <textarea  id="input" placeholder="Ask anything..."></textarea>
            </span>
            <span class="tools">
                <span class="icon send clicked">
                    <span class="send-btn"></span>
                </span>
                <span class="space"></span>
                <span class="icon  search clicked"></span>
                <span class="icon  audio-chat clicked"></span>
                <span class="icon  add-files clicked"></span>
            </span>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
